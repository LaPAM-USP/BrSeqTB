name: brseqtb

channels:
  - conda-forge
  - bioconda

channel_priority: strict

dependencies:

  # =========================
  # Core
  # =========================
  - python=3.10
  - pip
  - bc
  - curl
  - wget
  - unzip
  - parallel
  - pigz

  # =========================
  # Alignment / HTS
  # =========================
  - bwa=0.7.17
  - samtools=1.18
  - bcftools=1.18
  - htslib=1.18
  - tabix

  # =========================
  # Variant callers / normalization
  # =========================
  - gatk4
  - picard
  - delly
  - lofreq
  - vt=2015.11.10

  # =========================
  # Java tools
  # =========================
  - openjdk=17
  - snpeff=5.2

  # =========================
  # QC / phylogeny / taxonomy
  # =========================
  - fastqc
  - trimmomatic
  - iqtree
  - kaiju

  # =========================
  # Python scientific stack
  # =========================
  - numpy
  - pandas
  - networkx
  - biopython
  - pysam
  - openpyxl
  - xlsxwriter
  - python-docx

